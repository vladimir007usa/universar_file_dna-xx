# ═══════════════════════════════════════════════════════════════
# Universal File DNA — Middleware Configuration
# ═══════════════════════════════════════════════════════════════

server.port=8080

# Max file upload size (50 MB)
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# Python Logic Engine URL
python.service.url=http://localhost:5000

# Application name
spring.application.name=file-dna-middleware
